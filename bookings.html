<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookings</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial; }

    body {
      margin: 0;
      background: linear-gradient(180deg, #eef2ff, #f8fafc);
      color: #0f172a;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    .titleWrap h1 { margin: 0; font-size: 32px; line-height: 1.15; }
    .sub { margin: 8px 0 0; color: #475569; font-size: 13px; font-weight: 600; }

    .btn {
      border: none;
      cursor: pointer;
      padding: 12px 16px;
      border-radius: 14px;
      font-weight: 700;
      transition: transform .05s ease, opacity .2s ease;
      white-space: nowrap;
    }
    .btn:active { transform: translateY(1px); }
    .btn.secondary { background: white; border: 1px solid #cbd5e1; color: #0f172a; }
    .btn.primary { background: #4f46e5; color: white; font-size: 15px; padding: 14px 28px; }
    .btn.primary:hover { background: #4338ca; }

    /* ── History styles ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 12px;
    }

    .bookingCard {
      background: white;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,.06);
      border: 1px solid #e2e8f0;
    }

    .row { display: flex; gap: 16px; align-items: center; }

    .thumb {
      width: 120px;
      height: 80px;
      object-fit: cover;
      border-radius: 12px;
      background: #e2e8f0;
      flex-shrink: 0;
    }

    .bookingTitle {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .bookingTitle b { font-size: 16px; }

    .pillRow { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      color: #334155;
    }

    .meta { color: #334155; font-size: 13px; line-height: 1.4; }
    .muted { color: #64748b; font-size: 12px; margin-top: 8px; }

    /* ── Booking form styles ── */
    #bookForm {
      background: white;
      border-radius: 24px;
      padding: 36px;
      box-shadow: 0 20px 50px rgba(0,0,0,.08);
      max-width: 600px;
    }

    #bookForm h2 { margin: 0 0 6px; font-size: 24px; }
    #bookForm .carName { color: #4f46e5; font-weight: 700; font-size: 20px; margin-bottom: 24px; }

    .formGroup { margin-bottom: 20px; }
    .formGroup label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; color: #374151; }

    .formGroup input {
      width: 100%;
      height: 48px;
      border-radius: 14px;
      border: 1px solid #ddd;
      padding: 0 16px;
      font-size: 15px;
      outline: none;
      transition: border-color .15s;
    }
    .formGroup input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }

    .dateRow { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    #bookMsg {
      margin-top: 16px;
      font-size: 14px;
      font-weight: 600;
      min-height: 20px;
    }
    #bookMsg.error { color: #b91c1c; }
    #bookMsg.success { color: #166534; }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .topbar { flex-direction: column; }
      .dateRow { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="topbar">
      <button class="btn secondary" id="backBtn">← Back</button>
      <div class="titleWrap">
        <h1 id="pageTitle">Bookings</h1>
        <p class="sub" id="status"></p>
      </div>
    </div>

    <!-- Shown when ?id= is present: booking form -->
    <div id="bookForm" style="display:none;">
      <h2>Book this car</h2>
      <div class="carName" id="formCarName"></div>

      <div class="dateRow">
        <div class="formGroup">
          <label>Pickup Date</label>
          <input type="date" id="fromDate" />
        </div>
        <div class="formGroup">
          <label>Dropoff Date</label>
          <input type="date" id="toDate" />
        </div>
      </div>

      <div class="formGroup">
        <label>Pickup Location (optional)</label>
        <input type="text" id="pickupLocation" placeholder="e.g. Downtown Toronto" />
      </div>

      <div class="formGroup">
        <label>Dropoff Location (optional)</label>
        <input type="text" id="dropoffLocation" placeholder="e.g. Toronto Pearson Airport" />
      </div>

      <button class="btn primary" id="bookNowBtn">Book Now</button>
      <div id="bookMsg"></div>
    </div>

    <!-- Shown when no ?id=: booking history -->
    <div id="list" class="grid" style="display:none;"></div>
  </div>

  <script src="bookings.js"></script>
</body>
</html>
